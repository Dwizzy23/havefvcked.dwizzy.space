<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HF Bot Ultra</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
* { margin:0; padding:0; box-sizing:border-box; }

body {
    background: radial-gradient(circle at top, #0a0b10, #020203 70%);
    font-family: 'Poppins', sans-serif;
    color: #e6e6e6;
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
}

/* Animated background glow */
body::before {
    content:"";
    position:absolute;
    width:600px;
    height:600px;
    background: radial-gradient(circle, rgba(88,101,242,0.25), transparent 70%);
    top:-150px;
    left:-150px;
    filter: blur(120px);
    animation: floatGlow 8s ease-in-out infinite alternate;
}

body::after {
    content:"";
    position:absolute;
    width:500px;
    height:500px;
    background: radial-gradient(circle, rgba(255,0,120,0.2), transparent 70%);
    bottom:-150px;
    right:-150px;
    filter: blur(120px);
    animation: floatGlow 10s ease-in-out infinite alternate-reverse;
}

@keyframes floatGlow {
    0% { transform: translate(0,0) scale(1); }
    100% { transform: translate(50px,40px) scale(1.2); }
}

/* Card */
.card {
    position: relative;
    width: 430px;
    padding: 25px;
    border-radius: 20px;
    background: rgba(255,255,255,0.03);
    backdrop-filter: blur(25px);
    border: 1px solid rgba(255,255,255,0.08);
    box-shadow: 0 0 50px rgba(0,0,0,0.7);
    transition: 0.4s;
}

.card:hover {
    transform: translateY(-8px) scale(1.02);
    box-shadow: 0 0 80px rgba(88,101,242,0.4);
}

/* Animated border */
.card::before {
    content:"";
    position:absolute;
    inset:0;
    border-radius:20px;
    padding:1px;
    background: linear-gradient(120deg, transparent, #5865f2, #ff007a, transparent);
    background-size: 300% 300%;
    animation: borderFlow 6s linear infinite;
    -webkit-mask: 
        linear-gradient(#000 0 0) content-box, 
        linear-gradient(#000 0 0);
    -webkit-mask-composite: xor;
            mask-composite: exclude;
}

@keyframes borderFlow {
    0% { background-position: 0% 50%; }
    100% { background-position: 300% 50%; }
}

/* Header */
.header {
    display:flex;
    align-items:center;
    margin-bottom:20px;
}

.avatar {
    width:48px;
    height:48px;
    border-radius:50%;
    background: linear-gradient(135deg, #5865f2, #ff007a);
    display:flex;
    align-items:center;
    justify-content:center;
    font-weight:600;
    margin-right:12px;
    box-shadow: 0 0 20px rgba(88,101,242,0.8);
    animation: pulse 2.5s infinite;
}

@keyframes pulse {
    0% { box-shadow: 0 0 15px rgba(88,101,242,0.6); }
    50% { box-shadow: 0 0 30px rgba(255,0,120,0.9); }
    100% { box-shadow: 0 0 15px rgba(88,101,242,0.6); }
}

.bot-name { font-weight:600; }

.bot-tag {
    font-size:11px;
    background: linear-gradient(135deg, #5865f2, #ff007a);
    padding:2px 8px;
    border-radius:8px;
    margin-left:6px;
}

/* Title */
.title {
    margin-bottom:15px;
    opacity:0.9;
}

/* Commands */
.command {
    margin:12px 0;
    padding:14px;
    border-radius:14px;
    background: rgba(255,255,255,0.02);
    border:1px solid rgba(255,255,255,0.05);
    transition:0.3s;
    position:relative;
    overflow:hidden;
}

.command:hover {
    transform: translateX(6px) scale(1.02);
    background: rgba(255,255,255,0.06);
}

/* shimmer hover */
.command::after {
    content:"";
    position:absolute;
    top:0;
    left:-100%;
    width:100%;
    height:100%;
    background: linear-gradient(120deg, transparent, rgba(255,255,255,0.2), transparent);
    transition:0.5s;
}

.command:hover::after {
    left:100%;
}

.command span {
    color:#9aa7ff;
    font-weight:600;
}

/* subtext */
.sub {
    margin-top:5px;
    font-size:13px;
    opacity:0.75;
}

/* subtle floating */
.card {
    animation: floatCard 6s ease-in-out infinite;
}

@keyframes floatCard {
    0% { transform: translateY(0px); }
    50% { transform: translateY(-6px); }
    100% { transform: translateY(0px); }
}

</style>

</head>
<body>

<div class="card">

    <div class="header">
        <div class="avatar">HF</div>
        <div class="bot-name">
            HAVE FVCKED <span class="bot-tag">BOT</span>
        </div>
    </div>

    <div class="title">📜 Lista komend Twojego bota</div>

    <div class="command">
        <span>/split</span>
        <div class="sub">🎤 Vocal • 🎸 Bass • 🥁 Drums • 🎵 Melody</div>
    </div>

    <div class="command">
        <span>/bpm</span>
        <div class="sub">Analiza tempa utworu</div>
    </div>

    <div class="command">
        <span>/key</span>
        <div class="sub">Wykrywanie tonacji (key)</div>
    </div>

    <div class="command">
        <span>/convert</span>
        <div class="sub">Konwersja audio → WAV</div>
    </div>

</div>

</body>
</html>
