<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HF Bot</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    background: #0d0f14;
    font-family: 'Poppins', sans-serif;
    color: #e6e6e6;
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
}

/* Card */
.card {
    width: 400px;
    padding: 20px;
    border-radius: 16px;
    background: #1a1c22;
    border: 1px solid #2a2d35;
    box-shadow: 0 10px 40px rgba(0,0,0,0.6);
    transition: 0.3s;
}

.card:hover {
    transform: translateY(-5px);
    box-shadow: 0 20px 60px rgba(88,101,242,0.3);
}

/* Header */
.header {
    display: flex;
    align-items: center;
    margin-bottom: 20px;
}

.avatar {
    width: 45px;
    height: 45px;
    border-radius: 50%;
    background: #5865f2;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: bold;
    margin-right: 10px;
    animation: pulse 2s infinite;
}

@keyframes pulse {
    0% { box-shadow: 0 0 0 rgba(88,101,242,0.5); }
    50% { box-shadow: 0 0 20px rgba(88,101,242,0.9); }
    100% { box-shadow: 0 0 0 rgba(88,101,242,0.5); }
}

.bot-tag {
    background: #5865f2;
    font-size: 11px;
    padding: 2px 6px;
    border-radius: 6px;
    margin-left: 6px;
}

/* Commands */
.command {
    margin: 10px 0;
    padding: 12px;
    border-radius: 10px;
    background: #111318;
    border: 1px solid #2a2d35;
    transition: 0.25s;
}

.command:hover {
    transform: translateX(5px);
    background: #1f222a;
}

.command span {
    color: #8ea1ff;
    font-weight: 600;
}

.sub {
    font-size: 13px;
    opacity: 0.7;
    margin-top: 4px;
}
</style>

</head>
<body>

<div class="card">

    <div class="header">
        <div class="avatar">HF</div>
        <div>
            HAVE FVCKED <span class="bot-tag">BOT</span>
        </div>
    </div>

    <div class="command">
        <span>/split</span>
        <div class="sub">🎤 Vocal • 🎸 Bass • 🥁 Drums • 🎵 Melody</div>
    </div>

    <div class="command">
        <span>/bpm</span>
        <div class="sub">Analiza tempa</div>
    </div>

    <div class="command">
        <span>/key</span>
        <div class="sub">Wykrywanie tonacji</div>
    </div>

    <div class="command">
        <span>/convert</span>
        <div class="sub">Konwersja → WAV</div>
    </div>

</div>

</body>
</html>
